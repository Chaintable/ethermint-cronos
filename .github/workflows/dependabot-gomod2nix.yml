name: Update gomod2nix on Dependabot PRs

on:
  pull_request:
    paths:
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  update-gomod2nix:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout PR
        uses: actions/checkout@v5
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Configure Git for GitHub Verified Commit
        run: |
          git config user.name "dependabot[bot]"
          git config user.email "49699333+dependabot[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-22.11
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      
      - name: Run gomod2nix
        run: nix develop -c gomod2nix
      
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet gomod2nix.toml; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      

      - name: Commit and push gomod2nix.toml
        if: steps.changes.outputs.changed == 'true'
        env:
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          git add gomod2nix.toml
          git commit -m "chore: update gomod2nix.toml" -s
          git push origin HEAD:"$PR_BRANCH"

      - name: Comment on PR
        if: steps.changes.outputs.changed == 'true'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: Number("$PR_NUMBER"),
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Updated `gomod2nix.toml` automatically via `nix develop -c gomod2nix`'
            })
