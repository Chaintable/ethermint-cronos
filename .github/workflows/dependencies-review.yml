name: "Dependency Review"
on:
  pull_request:
    paths:
      - "**/*.go"
      - "**/go.mod"
      - "**/go.sum"
  merge_group:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v6
      - name: "Setup Go"
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.10"
          check-latest: true
      - name: "Dependency Review"
        uses: actions/dependency-review-action@v4
        with:
          base-ref: ${{ github.event.pull_request.base.sha || 'master' }}
          head-ref: ${{ github.event.pull_request.head.sha || github.ref }}
          fail-on-severity: high
      - name: "Go vulnerability check"
        id: govuln
        run: |
          # GO-2026-4479 is an unfixable vuln in github.com/pion/dtls/v2, pulled in
          # transitively via go-ethereum p2p → pion/stun/v2. Pion upstream only
          # patched v3; there is no v2 fix. Keep the allowlist narrow: any other
          # GO-ID fails the job.
          ALLOWED="GO-2026-4479"

          make vulncheck 2>&1 | tee govulncheck-output.txt || true

          vulnerabilities=$(grep -oE 'GO-[0-9]{4}-[0-9]+' govulncheck-output.txt | sort -u)
          echo "Detected vulnerabilities: $vulnerabilities"

          for vuln in $vulnerabilities; do
            if [ "$vuln" != "$ALLOWED" ]; then
              echo "Unallowed vulnerability $vuln found; failing."
              exit 1
            fi
          done

          echo "Only known unfixable vulnerability ($ALLOWED) present. Continuing."
