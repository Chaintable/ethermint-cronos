name: Dependabot Update All Go Modules
on: pull_request_target

permissions:
  contents: write
  pull-requests: write

env:
  PR_TITLE: ${{ github.event.pull_request.title }}

jobs:
  update-all:
    runs-on: ubuntu-latest
    if: >
      github.actor == 'dependabot[bot]' &&
      startsWith(github.event.pull_request.head.ref, 'dependabot/go_modules/')
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: "${{ secrets.APP_ID }}"
          private-key: "${{ secrets.APP_PRIVATE_KEY }}"
      - uses: actions/checkout@v7
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          token: "${{ steps.app-token.outputs.token }}"
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.10"
          check-latest: true
      - name: Extract updated dependency
        id: deps
        run: |
          # Parse Dependabot PR titles of the form:
          #   build(deps): bump <module-path> from <x> to <y>
          # Grouped PR titles (e.g. "bump the go_modules group across 1 directory")
          # do not match and are handled by falling through to a tidy-only run.
          name=$(echo "$PR_TITLE" | grep -oE 'bump [^ ]+' | head -1 | awk '{print $2}' || true)
          version=$(echo "$PR_TITLE" | grep -oE 'to [0-9]+\.[0-9]+\.[0-9]+' | awk '{print $2}' || true)
          if [[ -z "$name" || -z "$version" ]]; then
            echo "Grouped or unparseable PR title; skipping single-dep update."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            {
              echo "name=$name"
              echo "version=$version"
              echo "skip=false"
            } >> "$GITHUB_OUTPUT"
          fi
      - name: Update all Go modules
        if: steps.deps.outputs.skip != 'true'
        run: ./scripts/go-update-dep-all.sh ${{ format('{0}@v{1}', steps.deps.outputs.name, steps.deps.outputs.version) }}
      - name: Tidy all Go modules
        run: ./scripts/go-mod-tidy-all.sh
      - name: Commit changes
        uses: EndBug/add-and-commit@v10
        with:
          default_author: user_info
          message: "${{ github.event.pull_request.title }} for all modules"
